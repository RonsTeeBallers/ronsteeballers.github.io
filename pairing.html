<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pairing — RonsTeeBallers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
    }

    .header {
      background: #1a5276;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      font-size: 22px;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
      padding: 4px;
    }
    .header-info { flex: 1; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub { font-size: 12px; opacity: 0.8; }
    .header-count {
      background: rgba(255,255,255,0.2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .header-count.all-assigned { background: #1e8449; }

    .toolbar {
      background: white;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #e0e8f0;
      overflow-x: auto;
    }

    .toolbar-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .toolbar-btn:active { transform: scale(0.97); }
    .btn-add-foursome { background: #eaf2ff; color: #1a5276; }
    .btn-send { background: #1e8449; color: white; }
    .btn-send:disabled { background: #aab7c4; cursor: not-allowed; }
    .btn-back-org { background: #f2f3f4; color: #5d6d7e; }

    .layout {
      display: flex;
      gap: 0;
      height: calc(100vh - 110px);
    }

    .unassigned-panel {
      width: 200px;
      min-width: 200px;
      background: white;
      border-right: 2px solid #e0e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #5d6d7e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f0f4f8;
      background: #f8fafc;
    }

    .unassigned-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .foursomes-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .player-card {
      background: white;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: grab;
      border-left: 4px solid #d0d8e4;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: all 0.15s;
      user-select: none;
    }
    .player-card:active { cursor: grabbing; }
    .player-card.dragging { opacity: 0.5; transform: scale(0.98); }
    .player-card.scramble { border-left-color: #1e8449; }
    .player-card.ownball { border-left-color: #1a5276; }
    .player-card.nopref { border-left-color: #aab7c4; }
    .player-card.has-avoid { background: #fffbf0; }

    .card-name { font-size: 14px; font-weight: 700; color: #1a2332; margin-bottom: 4px; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }

    .tag { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
    .tag-walk { background: #eaf2ff; color: #1a5276; }
    .tag-ride { background: #fef9e7; color: #d68910; }
    .tag-nopref-wr { background: #f2f3f4; color: #5d6d7e; }
    .tag-scramble { background: #eafaf1; color: #1e8449; }
    .tag-ownball { background: #eaf2ff; color: #1a5276; }
    .tag-avoid { background: #fdf2f2; color: #922b21; }

    .card-preferred { font-size: 10px; color: #5d6d7e; margin-top: 2px; }
    .card-comments { font-size: 10px; color: #922b21; margin-top: 2px; font-style: italic; }

    .foursome {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .foursome-header {
      background: #1a5276;
      color: white;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .foursome-title { font-size: 15px; font-weight: 700; flex: 1; }
    .foursome-time { font-size: 13px; opacity: 0.85; }
    .foursome-count {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .foursome-count.full { background: #1e8449; }

    .foursome-body { padding: 8px; min-height: 60px; }

    .drop-zone {
      border: 2px dashed #d0d8e4;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: #aab7c4;
      font-size: 13px;
      margin-top: 4px;
      transition: all 0.15s;
    }
    .drop-zone.drag-over-zone { border-color: #1a5276; background: #eaf2ff; color: #1a5276; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #5d6d7e;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eaf2ff;
      border-top-color: #1a5276;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2332;
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .unassigned-panel { width: 160px; min-width: 160px; }
      .player-card { padding: 8px 10px; }
      .card-name { font-size: 13px; }
    }
    <div class="header">
  <button class="header-back" onclick="window.location.href='organizer.html'">‹</button>
  <div class="header-info">
    <div class="header-title" id="header-venue">Loading...</div>
    <div class="header-sub" id="header-date"></div>
  </div>
  <div class="header-count" id="unassigned-count">0 unassigned</div>
</div>

<div class="toolbar">
  <button class="toolbar-btn btn-add-foursome" onclick="addFoursome()">+ Add Foursome</button>
  <button class="toolbar-btn btn-send" id="btn-send" onclick="sendPairings()" disabled>Send Pairings</button>
  <button class="toolbar-btn btn-back-org" onclick="window.location.href='organizer.html'">Dashboard</button>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Loading players...
</div>

<div id="app" style="display:none;">
  <div class="layout">
    <div class="unassigned-panel">
      <div class="panel-header">Unassigned</div>
      <div class="unassigned-list" id="unassigned-list"
        ondragover="allowDrop(event)"
        ondrop="dropToUnassigned(event)">
      </div>
    </div>
    <div class="foursomes-panel" id="foursomes-panel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
  </style>
</head>
<body>
  <script>
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzL0X46zPieSTws-g4CvgWJHHdIjchU9yTVU70OK54FsaaKhIw58-paJXv5MMP3gd9C/exec';

  var eventId = '';
  var allPlayers = [];
  var foursomes = [];
  var teeTimeInterval = 9;
  var startMinutes = 0;
  var draggedPlayer = null;

  function getParams() {
    var params = new URLSearchParams(window.location.search);
    return { event: params.get('event') || '' };
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function jsonpCall(action, params, callback) {
    var fnName = 'handle_' + action.replace(/[^a-z]/gi,'_') + '_' + Date.now();
    window[fnName] = function(data) { callback(data); };
    var url = BACKEND_URL + '?action=' + action + '&callback=' + fnName;
    if (params) {
      for (var key in params) {
        url += '&' + key + '=' + encodeURIComponent(params[key]);
      }
    }
    var script = document.createElement('script');
    script.src = url;
    document.body.appendChild(script);
  }

  function formatTime(minutes) {
    var h = Math.floor(minutes / 60);
    var m = minutes % 60;
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
  }

  function parseTime(timeStr) {
    if (!timeStr) return 660;
    var clean = timeStr.toString().trim();
    var parts = clean.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!parts) return 660;
    var h = parseInt(parts[1]);
    var m = parseInt(parts[2]);
    var ampm = parts[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h * 60 + m;
  }

  function getScoringClass(scoring) {
    if (!scoring) return 'nopref';
    var v = scoring.toLowerCase();
    if (v === 'scramble') return 'scramble';
    if (v === 'own ball') return 'ownball';
    return 'nopref';
  }

  function getWalkRideTag(wr) {
    if (!wr) return '';
    var v = wr.toLowerCase();
    if (v === 'walk') return '<span class="tag tag-walk">Walk</span>';
    if (v === 'ride') return '<span class="tag tag-ride">Ride</span>';
    return '<span class="tag tag-nopref-wr">Either</span>';
  }

  function getScoringTag(scoring) {
    if (!scoring) return '';
    var v = scoring.toLowerCase();
    if (v === 'scramble') return '<span class="tag tag-scramble">Scramble</span>';
    if (v === 'own ball') return '<span class="tag tag-ownball">Own Ball</span>';
    return '';
  }

  function checkAvoidConflict(player, members) {
    if (!player.avoid) return false;
    var avoidList = player.avoid.toLowerCase().split(';').map(function(s) { return s.trim(); });
    for (var i = 0; i < members.length; i++) {
      var memberName = members[i].name.toLowerCase();
      for (var j = 0; j < avoidList.length; j++) {
        if (avoidList[j] && memberName.indexOf(avoidList[j]) !== -1) return true;
      }
      if (members[i].avoid) {
        var memberAvoid = members[i].avoid.toLowerCase().split(';').map(function(s) { return s.trim(); });
        var pname = player.name.toLowerCase();
        for (var k = 0; k < memberAvoid.length; k++) {
          if (memberAvoid[k] && pname.indexOf(memberAvoid[k]) !== -1) return true;
        }
      }
    }
    return false;
  }
    function buildPlayerCard(player, foursomeIdx) {
    var scoringClass = getScoringClass(player.scoring);
    var hasAvoid = false;

    if (foursomeIdx !== null && foursomeIdx !== undefined) {
      var fs = foursomes[foursomeIdx];
      if (fs) {
        var others = fs.players.filter(function(p) { return p.name !== player.name; });
        hasAvoid = checkAvoidConflict(player, others);
      }
    }

    var cardId = 'card-' + player.name.replace(/[^a-z0-9]/gi, '_');
    var html = '<div class="player-card ' + scoringClass + (hasAvoid ? ' has-avoid' : '') + '" ';
    html += 'id="' + cardId + '" ';
    html += 'draggable="true" ';
    html += 'ondragstart="dragStart(event, \'' + player.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')" ';
    html += 'ondragend="dragEnd(event)">';
    html += '<div class="card-name">' + player.name + '</div>';
    html += '<div class="card-tags">';
    html += getWalkRideTag(player.walkRide);
    html += getScoringTag(player.scoring);
    if (hasAvoid) html += '<span class="tag tag-avoid">Avoid conflict</span>';
    html += '</div>';
    if (player.preferred) {
      html += '<div class="card-preferred">Prefers: ' + player.preferred + '</div>';
    }
    if (player.comments) {
      html += '<div class="card-comments">' + player.comments + '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderUnassigned() {
    var list = document.getElementById('unassigned-list');
    var unassigned = allPlayers.filter(function(p) { return !p.assigned; });
    if (unassigned.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#aab7c4;font-size:12px;">All players assigned!</div>';
    } else {
      list.innerHTML = unassigned.map(function(p) { return buildPlayerCard(p, null); }).join('');
    }
    updateUnassignedCount();
  }

  function updateUnassignedCount() {
    var unassigned = allPlayers.filter(function(p) { return !p.assigned; });
    var countEl = document.getElementById('unassigned-count');
    countEl.textContent = unassigned.length + ' unassigned';
    countEl.className = 'header-count' + (unassigned.length === 0 ? ' all-assigned' : '');
    document.getElementById('btn-send').disabled = unassigned.length > 0;
  }

  function renderFoursomes() {
    var panel = document.getElementById('foursomes-panel');
    var html = '';
    foursomes.forEach(function(fs, idx) {
      var teeTime = formatTime(startMinutes + idx * teeTimeInterval);
      var isFull = fs.players.length >= 4;
      html += '<div class="foursome" id="foursome-' + idx + '">';
      html += '<div class="foursome-header">';
      html += '<span class="foursome-title">Foursome ' + (idx + 1) + '</span>';
      html += '<span class="foursome-time">' + teeTime + '</span>';
      html += '<span class="foursome-count' + (isFull ? ' full' : '') + '">' + fs.players.length + '/4</span>';
      html += '</div>';
      html += '<div class="foursome-body" id="body-' + idx + '" ';
      html += 'ondragover="allowDrop(event)" ondrop="dropToFoursome(event,' + idx + ')">';
      fs.players.forEach(function(player) {
        html += buildPlayerCard(player, idx);
      });
      if (!isFull) {
        html += '<div class="drop-zone" id="zone-' + idx + '" ';
        html += 'ondragover="allowDrop(event);highlightZone(' + idx + ')" ';
        html += 'ondragleave="unhighlightZone(' + idx + ')" ';
        html += 'ondrop="dropToFoursome(event,' + idx + ')">Drop player here</div>';
      }
      html += '</div></div>';
    });
    panel.innerHTML = html;
  }

  function render() {
    renderUnassigned();
    renderFoursomes();
  }

  function addFoursome() {
    foursomes.push({ players: [] });
    render();
    showToast('Foursome ' + foursomes.length + ' added');
  }

  function allowDrop(e) { e.preventDefault(); }

  function highlightZone(idx) {
    var z = document.getElementById('zone-' + idx);
    if (z) z.classList.add('drag-over-zone');
  }

  function unhighlightZone(idx) {
    var z = document.getElementById('zone-' + idx);
    if (z) z.classList.remove('drag-over-zone');
  }

  function dragStart(e, playerName) {
    draggedPlayer = playerName;
    e.dataTransfer.setData('text/plain', playerName);
    setTimeout(function() {
      var card = document.getElementById('card-' + playerName.replace(/[^a-z0-9]/gi, '_'));
      if (card) card.classList.add('dragging');
    }, 0);
  }

  function dragEnd(e) {
    document.querySelectorAll('.player-card.dragging').forEach(function(c) {
      c.classList.remove('dragging');
    });
  }

  function findPlayer(name) {
    for (var i = 0; i < allPlayers.length; i++) {
      if (allPlayers[i].name === name) return allPlayers[i];
    }
    return null;
  }

  function removeFromFoursomes(name) {
    foursomes.forEach(function(fs) {
      fs.players = fs.players.filter(function(p) { return p.name !== name; });
    });
  }

  function dropToFoursome(e, idx) {
    e.preventDefault();
    unhighlightZone(idx);
    var name = e.dataTransfer.getData('text/plain');
    if (!name) return;
    var player = findPlayer(name);
    if (!player) return;
    var fs = foursomes[idx];
    if (fs.players.length >= 4) { showToast('Foursome ' + (idx+1) + ' is full'); return; }
    if (fs.players.some(function(p) { return p.name === name; })) return;
    if (checkAvoidConflict(player, fs.players)) showToast('Avoid conflict detected');
    removeFromFoursomes(name);
    player.assigned = true;
    fs.players.push(player);
    render();
  }

  function dropToUnassigned(e) {
    e.preventDefault();
    var name = e.dataTransfer.getData('text/plain');
    if (!name) return;
    var player = findPlayer(name);
    if (!player) return;
    removeFromFoursomes(name);
    player.assigned = false;
    render();
  }

  function sendPairings() {
    showToast('Sending pairings — coming soon!');
  }
    function init() {
    var params = getParams();
    eventId = params.event;

    jsonpCall('getEvent', { eventId: eventId, player: 'organizer' }, function(data) {
      if (data.event) {
        document.getElementById('header-venue').textContent = data.event.venue || 'Golf Outing';
        var d = new Date(eventId + 'T12:00:00');
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        document.getElementById('header-date').textContent =
          days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
        startMinutes = parseTime(data.event.time);
      }
    });

    jsonpCall('getConfirmed', { eventId: eventId }, function(data) {
      if (data.error) {
        showToast('Error: ' + data.error);
        return;
      }

      allPlayers = (data.confirmed || []).map(function(p) {
        return {
          name: p.name,
          walkRide: p.walkRide || 'No preference',
          scoring: p.scoring || 'No Preference',
          preferred: p.preferred || '',
          avoid: p.avoid || '',
          comments: p.comments || '',
          assigned: false
        };
      });

      var numFoursomes = Math.ceil(allPlayers.length / 4);
      for (var i = 0; i < numFoursomes; i++) {
        foursomes.push({ players: [] });
      }

      var loadingEl = document.getElementById('loading');
      var appEl = document.getElementById('app');
      if (loadingEl) loadingEl.style.display = 'none';
      if (appEl) appEl.style.display = 'block';
      render();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
