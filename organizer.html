<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Organizer Dashboard — RonsTeeBallers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
    }

    .header {
      background: #1a5276;
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    .header .logo { font-size: 28px; margin-bottom: 4px; }
    .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .header p { font-size: 13px; opacity: 0.8; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #5d6d7e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 20px 16px 8px;
    }

    .card {
      background: white;
      margin: 0 16px 12px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .event-card {
      background: white;
      margin: 0 16px 12px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-left: 4px solid #1a5276;
    }

    .event-card.oversubscribed { border-left-color: #922b21; }
    .event-card.full { border-left-color: #1e8449; }

    .event-venue { font-size: 17px; font-weight: 700; color: #1a2332; margin-bottom: 4px; }
    .event-date { font-size: 14px; color: #5d6d7e; margin-bottom: 10px; }

    .event-stats { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

    .stat-pill {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: #eaf2ff;
      color: #1a5276;
    }
    .stat-pill.warning { background: #fdf2f2; color: #922b21; }
    .stat-pill.success { background: #eafaf1; color: #1e8449; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #eaf2ff;
      border-radius: 3px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-fill { height: 100%; background: #1a5276; border-radius: 3px; }
    .progress-fill.full { background: #1e8449; }
    .progress-fill.over { background: #922b21; }

    .event-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 8px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      border: none;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a5276; color: white; }
    .btn-primary:active { background: #154360; }
    .btn-secondary { background: white; color: #1a5276; border: 2px solid #1a5276; }
    .btn-secondary:active { background: #eaf2ff; }
    .btn-success { background: #1e8449; color: white; }
    .btn-success:active { background: #196f3d; }

    .btn-full {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 12px;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      border: none;
      transition: all 0.15s;
      background: #1a5276;
      color: white;
    }
    .btn-full:active { background: #154360; }

    .tools-card {
      background: white;
      margin: 0 16px 12px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: white;
      border: none;
      width: 100%;
      text-align: left;
      font-size: 15px;
      font-weight: 600;
      color: #1a2332;
      cursor: pointer;
      border-bottom: 1px solid #f0f4f8;
    }
    .tool-btn:last-child { border-bottom: none; }
    .tool-btn:active { background: #eaf2ff; }
    .tool-btn .icon { font-size: 20px; width: 28px; text-align: center; }
    .tool-btn .arrow { margin-left: auto; color: #aab7c4; font-size: 18px; }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #5d6d7e;
      font-size: 16px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #eaf2ff;
      border-top-color: #1a5276;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-events { text-align: center; padding: 30px 20px; color: #5d6d7e; }
    .empty-events .icon { font-size: 40px; margin-bottom: 10px; }
    .empty-events p { font-size: 15px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2332;
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 24px 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 20px; font-weight: 700; color: #1a5276; margin-bottom: 20px; text-align: center; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 13px;
      font-weight: 700;
      color: #5d6d7e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #d0d8e4;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      color: #1a2332;
      transition: border-color 0.15s;
    }
    .form-input:focus { outline: none; border-color: #1a5276; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 16px; font-size: 16px; }

    .bottom-spacer { height: 24px; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">⛳</div>
  <h1>RonsTeeBallers</h1>
  <p>Organizer Dashboard</p>
</div>

<div id="loading" class="loading" style="margin:16px;">
  <div class="spinner"></div>
  Loading...
</div>

<div id="app" style="display:none;">

  <div class="section-label">Open Events</div>
  <div id="events-container"></div>

  <button class="btn-full" onclick="showCreateEvent()">+ Create New Event</button>

  <div class="section-label">Tools</div>
  <div class="tools-card">
    <button class="tool-btn" onclick="window.location.href='stats.html'">
      <span class="icon">📊</span>
      <span>View Statistics</span>
      <span class="arrow">›</span>
    </button>
    <button class="tool-btn" onclick="showBroadcast()">
      <span class="icon">📧</span>
      <span>Send email to all active players</span>
      <span class="arrow">›</span>
    </button>
  </div>

  <div class="bottom-spacer"></div>
</div>

  <!-- Invite Preview Modal -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <h2>Preview &amp; Send Invite</h2>
    <div id="invite-details" style="background:#eaf2ff;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;color:#1a2332;"></div>
    <div class="form-group">
      <label class="form-label">Preview — exactly what players receive</label>
      <div id="invite-preview-status" style="font-size:13px;color:#5d6d7e;margin-bottom:8px;">Loading preview…</div>
      <iframe id="invite-frame" title="Invite preview" style="width:100%;height:360px;border:1px solid #d0d8e4;border-radius:8px;background:white;"></iframe>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideInvitePreview()">Cancel</button>
      <button class="btn btn-primary" id="btn-send-invite" onclick="sendInvites()">Send Invites</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="remind-modal">
  <div class="modal">
    <h2>Preview &amp; Send Reminder</h2>
    <div id="remind-details" style="background:#eaf2ff;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;color:#1a2332;"></div>
    <div class="form-group">
      <label class="form-label">Your message (editable — appears at the top of the reminder)</label>
      <textarea class="form-input" id="remind-message" rows="3" style="resize:vertical;" onchange="loadRemindPreview()"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Preview — exactly what non-responders receive</label>
      <div id="remind-preview-status" style="font-size:13px;color:#5d6d7e;margin-bottom:8px;">Loading preview…</div>
      <iframe id="remind-frame" title="Reminder preview" style="width:100%;height:360px;border:1px solid #d0d8e4;border-radius:8px;background:white;"></iframe>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideRemindPreview()">Cancel</button>
      <button class="btn btn-primary" id="btn-send-remind" onclick="sendReminders()">Send Reminders</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="broadcast-modal">
  <div class="modal">
    <h2>Send Email to All Active Players</h2>
    <div id="broadcast-info" style="background:#eaf2ff;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;color:#1a2332;">Loading recipient count…</div>
    <div class="form-group">
      <label class="form-label">Subject</label>
      <input class="form-input" id="broadcast-subject" type="text" value="RonsTeeBallers - General Communication">
    </div>
    <div class="form-group">
      <label class="form-label">Message</label>
      <textarea class="form-input" id="broadcast-body" rows="8" style="resize:vertical;" placeholder="Type your message to all active players…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideBroadcast()">Cancel</button>
      <button class="btn btn-primary" id="btn-send-broadcast" onclick="sendBroadcast()">Send to All</button>
    </div>
  </div>
</div>
  
<!-- Create Event Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>Create New Event</h2>

    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" class="form-input" id="new-date">
    </div>

    <div class="form-group">
      <label class="form-label">Venue</label>
      <select class="form-input" id="new-venue">
        <option value="">Select venue...</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Starting Time</label>
      <input type="time" class="form-input" id="new-time">
    </div>

    <div class="form-group">
      <label class="form-label">Tee Times Reserved</label>
      <input type="number" class="form-input" id="new-slots" min="1" max="20" placeholder="e.g. 5">
    </div>

    <div class="form-group">
      <label class="form-label">Mailing List</label>
      <select class="form-input" id="new-mailing-list">
        <option value="Main Group">Main Group (~63 players)</option>
        <option value="Indian Lakes">Indian Lakes</option>
        <option value="X-Golf">X-Golf</option>
        <option value="Indian Lakes & X-Golf">Indian Lakes &amp; X-Golf</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <input type="text" class="form-input" id="new-notes"
        placeholder="Any special notes for this event...">
    </div>

    <div id="create-error" style="display:none;background:#fdf2f2;border:1px solid #e74c3c;color:#922b21;padding:10px 14px;border-radius:8px;font-size:14px;margin-top:8px;"></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideCreateEvent()">Cancel</button>
      <button class="btn btn-primary" id="btn-create-event" onclick="submitNewEvent()">Create Event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxTDDH0nhMzS4YycZImyXV6w_cZr9j1jrF4A9VwljttPzNVH1oE5Xgx3c_8QXveneWA/exec';
  var currentEventId = '';
  var PASSCODE = localStorage.getItem('rtb_passcode') || '';

  function ensureOrganizerAccess(onOk) {
    jsonpCall('checkPasscode', { passcode: PASSCODE }, function(data) {
      if (!data || data.error || data.valid || data.required === false) { onOk(); return; }
      showPasscodeGate(onOk);
    });
  }

  function showPasscodeGate(onOk) {
    var ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:#1a5276;display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;';
    ov.innerHTML =
      '<div style="background:white;border-radius:16px;padding:28px 22px;max-width:340px;width:100%;text-align:center;">' +
      '<div style="font-size:40px;">&#9971;</div>' +
      '<h2 style="font-size:20px;color:#1a5276;margin:8px 0 4px;">Organizer Access</h2>' +
      '<p style="font-size:14px;color:#5d6d7e;margin-bottom:16px;">Enter the organizer passcode to continue.</p>' +
      '<input id="pc-input" type="password" placeholder="Passcode" style="width:100%;padding:14px;border:2px solid #d0d8e4;border-radius:10px;font-size:16px;margin-bottom:10px;">' +
      '<div id="pc-err" style="display:none;color:#922b21;font-size:13px;margin-bottom:10px;"></div>' +
      '<button id="pc-go" style="width:100%;padding:14px;background:#1a5276;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;">Enter</button>' +
      '</div>';
    document.body.appendChild(ov);
    var input = ov.querySelector('#pc-input');
    var err = ov.querySelector('#pc-err');
    var go = ov.querySelector('#pc-go');
    input.focus();
    function submit() {
      var val = input.value.trim();
      if (!val) return;
      go.disabled = true; go.textContent = 'Checking…';
      jsonpCall('checkPasscode', { passcode: val }, function(data) {
        go.disabled = false; go.textContent = 'Enter';
        if (data && data.valid) {
          PASSCODE = val;
          localStorage.setItem('rtb_passcode', val);
          document.body.removeChild(ov);
          onOk();
        } else {
          err.style.display = 'block';
          err.textContent = 'Incorrect passcode. Try again.';
        }
      });
    }
    go.onclick = submit;
    input.onkeydown = function(e) { if (e.key === 'Enter') submit(); };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    var d = new Date(dateStr + 'T12:00:00');
    return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function jsonpCall(action, params, callback) {
    var fnName = 'handle_' + action.replace(/[^a-z]/gi,'_') + '_' + Date.now();
    window[fnName] = function(data) { callback(data); };

    var url = BACKEND_URL + '?action=' + action + '&callback=' + fnName;
    if (params) {
      for (var key in params) {
        url += '&' + key + '=' + encodeURIComponent(params[key]);
      }
    }
    if (action !== 'checkPasscode') url += '&passcode=' + encodeURIComponent(PASSCODE);

    var script = document.createElement('script');
    script.src = url;
    document.body.appendChild(script);
  }

  function loadEvents() {
    var timeout = setTimeout(function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('events-container').innerHTML =
        '<div class="empty-events"><div class="icon">⚠️</div><p>Could not load events.<br>Check your connection and refresh.</p></div>';
    }, 8000);

    jsonpCall('getOpenEvents', {}, function(data) {
      clearTimeout(timeout);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      var container = document.getElementById('events-container');

      if (!data.events || data.events.length === 0) {
        container.innerHTML = '<div class="empty-events"><div class="icon">📅</div><p>No open events.<br>Create one to get started.</p></div>';
        return;
      }

      var html = '';
      data.events.forEach(function(event) {
        var pct = event.totalSlots > 0 ? Math.min((event.confirmed / event.totalSlots) * 100, 100) : 0;
        var isOver = event.confirmed > event.totalSlots;
        var isFull = event.confirmed === event.totalSlots;
        var cardClass = isOver ? 'event-card oversubscribed' : isFull ? 'event-card full' : 'event-card';
        var pillClass = isOver ? 'stat-pill warning' : isFull ? 'stat-pill success' : 'stat-pill';
        var fillClass = isOver ? 'progress-fill over' : isFull ? 'progress-fill full' : 'progress-fill';

        if (currentEventId === '') currentEventId = event.id;

        html += '<div class="' + cardClass + '">';
        html += '<div class="event-venue">' + event.venue + '</div>';
        html += '<div class="event-date">' + formatDate(event.date) + ' &bull; ' + event.time + '</div>';
        html += '<div class="event-stats">';
        html += '<span class="' + pillClass + '">' + event.confirmed + ' of ' + event.totalSlots + ' confirmed</span>';
        if (isOver) html += '<span class="stat-pill warning">Oversubscribed</span>';
        html += '</div>';
        html += '<div class="progress-bar"><div class="' + fillClass + '" style="width:' + pct + '%"></div></div>';
        html += '<div class="event-actions">';
        html += '<button class="btn btn-secondary" onclick="viewPlayers(\'' + event.id + '\')">Players</button>';
        html += '<button class="btn btn-primary" onclick="showInvitePreview(\'' + event.id + '\',\'' + event.venue + '\',\'' + event.mailingList + '\')">Invite</button>';
        html += '<button class="btn btn-secondary" onclick="showRemindPreview(\'' + event.id + '\',\'' + event.venue + '\',\'' + event.mailingList + '\',' + Math.max(0, event.totalSlots - event.confirmed) + ')">Remind</button>';
        html += '<button class="btn btn-primary" onclick="goToPairing(\'' + event.id + '\')">Pair</button>';
        html += '</div>';
        html += '</div>';
      });

      container.innerHTML = html;
    });
  }
function viewPlayers(eventId) {
    window.location.href = 'signup.html?event=' + eventId;
  }

  function goToPairing(eventId) {
    window.location.href = 'pairing.html?event=' + eventId;
  }

  var currentInviteEventId = '';
  var currentMailingList = '';

  function showInvitePreview(eventId, venue, mailingList) {
    currentInviteEventId = eventId;
    currentMailingList = mailingList;
    document.getElementById('invite-details').textContent =
      venue + ' — ' + formatDate(eventId);
    document.getElementById('btn-send-invite').disabled = false;
    document.getElementById('btn-send-invite').textContent = 'Send Invites';
    document.getElementById('invite-frame').srcdoc = '';
    document.getElementById('invite-modal').classList.add('show');
    loadInvitePreview();
  }

  function loadInvitePreview() {
    var status = document.getElementById('invite-preview-status');
    status.textContent = 'Loading preview…';
    jsonpCall('previewInvite', {
      eventId: currentInviteEventId,
      mailingList: currentMailingList
    }, function(data) {
      if (data && data.success) {
        document.getElementById('invite-frame').srcdoc = data.html;
        status.textContent = 'Will send to ' + data.count + ' player' +
          (data.count === 1 ? '' : 's') + ' in ' + data.mailingList +
          (data.sampleName ? ' (preview addressed to ' + data.sampleName + ')' : '');
        var sb = document.getElementById('btn-send-invite');
        sb.textContent = data.count > 0 ? 'Send to ' + data.count : 'Send Invites';
        sb.disabled = data.count === 0;
      } else {
        status.textContent = 'Preview error: ' + ((data && data.error) || 'unknown');
      }
    });
  }

  function hideInvitePreview() {
    document.getElementById('invite-modal').classList.remove('show');
  }

  function sendInvites() {
    var btn = document.getElementById('btn-send-invite');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    jsonpCall('sendInviteEmails', {
      eventId: currentInviteEventId,
      mailingList: currentMailingList
    }, function(data) {
      btn.disabled = false;
      btn.textContent = 'Send Invites';
      if (data && data.success) {
        hideInvitePreview();
        showToast('Sent ' + data.sent + ' invites successfully!');
      } else {
        document.getElementById('invite-preview-status').textContent =
          'Send error: ' + ((data && data.error) || 'Unknown error');
      }
    });
  }
  
  // ── Remind non-responders ─────────────────────────────────────────
  var currentRemindEventId = '';
  var currentRemindMailingList = '';

  function showRemindPreview(eventId, venue, mailingList, openSpots) {
    currentRemindEventId = eventId;
    currentRemindMailingList = mailingList;
    var spotWord = (openSpots === 1) ? 'spot' : 'spots';
    document.getElementById('remind-message').value =
      'Quick reminder -- we have ' + openSpots + ' ' + spotWord + ' open for ' + venue +
      '. Tap I\'M IN below to grab a spot. Thanks! -- Ron';
    document.getElementById('remind-details').textContent = venue + ' — ' + formatDate(eventId);
    document.getElementById('btn-send-remind').disabled = false;
    document.getElementById('btn-send-remind').textContent = 'Send Reminders';
    document.getElementById('remind-frame').srcdoc = '';
    document.getElementById('remind-modal').classList.add('show');
    loadRemindPreview();
  }

  function loadRemindPreview() {
    var status = document.getElementById('remind-preview-status');
    status.textContent = 'Loading preview…';
    jsonpCall('previewInvite', {
      eventId: currentRemindEventId,
      mailingList: currentRemindMailingList,
      remindOnly: 'true',
      comment: document.getElementById('remind-message').value
    }, function(data) {
      if (data && data.success) {
        document.getElementById('remind-frame').srcdoc = data.html;
        status.textContent = 'Will remind ' + data.count + ' player' +
          (data.count === 1 ? '' : 's') + " who haven't responded" +
          (data.count === 0 ? ' — everyone has replied!' : '');
        var sb = document.getElementById('btn-send-remind');
        sb.textContent = data.count > 0 ? 'Send to ' + data.count : 'Send Reminders';
        sb.disabled = data.count === 0;
      } else {
        status.textContent = 'Preview error: ' + ((data && data.error) || 'unknown');
      }
    });
  }

  function hideRemindPreview() {
    document.getElementById('remind-modal').classList.remove('show');
  }

  function sendReminders() {
    var btn = document.getElementById('btn-send-remind');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    jsonpCall('sendInviteEmails', {
      eventId: currentRemindEventId,
      mailingList: currentRemindMailingList,
      remindOnly: 'true',
      comment: document.getElementById('remind-message').value
    }, function(data) {
      btn.disabled = false;
      btn.textContent = 'Send Reminders';
      if (data && data.success) {
        hideRemindPreview();
        showToast('Sent ' + data.sent + ' reminder' + (data.sent === 1 ? '' : 's') + '!');
      } else {
        document.getElementById('remind-preview-status').textContent =
          'Send error: ' + ((data && data.error) || 'Unknown error');
      }
    });
  }

  // ── Broadcast email to all active players ─────────────────────────
  function showBroadcast() {
    document.getElementById('broadcast-subject').value = 'RonsTeeBallers - General Communication';
    document.getElementById('broadcast-body').value = '';
    document.getElementById('broadcast-info').textContent = 'Loading recipient count…';
    document.getElementById('btn-send-broadcast').disabled = false;
    document.getElementById('btn-send-broadcast').textContent = 'Send to All';
    document.getElementById('broadcast-modal').classList.add('show');
    jsonpCall('broadcastPreview', {}, function(data) {
      if (data && data.success) {
        document.getElementById('broadcast-info').textContent =
          'This will email ' + data.count + ' active player' + (data.count === 1 ? '' : 's') +
          '. (Brevo free tier allows ~300 emails/day.)';
      } else {
        document.getElementById('broadcast-info').textContent =
          'Could not load recipient count: ' + ((data && data.error) || 'unknown');
      }
    });
  }

  function hideBroadcast() {
    document.getElementById('broadcast-modal').classList.remove('show');
  }

  function sendBroadcast() {
    var subject = document.getElementById('broadcast-subject').value.trim();
    var body = document.getElementById('broadcast-body').value;
    if (!subject) { showToast('Please enter a subject.'); return; }
    if (!body.trim()) { showToast('Please enter a message.'); return; }
    if (!confirm('Send this email to all active players?')) return;
    var btn = document.getElementById('btn-send-broadcast');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    jsonpCall('broadcastEmail', { subject: subject, body: body }, function(data) {
      btn.disabled = false;
      btn.textContent = 'Send to All';
      if (data && data.success) {
        hideBroadcast();
        showToast('Sent to ' + data.sent + ' of ' + data.total + ' players.');
      } else {
        document.getElementById('broadcast-info').textContent =
          'Send error: ' + ((data && data.error) || 'Unknown error');
      }
    });
  }

  function showCreateEvent() {
    loadVenues();
    document.getElementById('create-error').style.display = 'none';
    var btn = document.getElementById('btn-create-event');
    btn.disabled = false;
    btn.textContent = 'Create Event';
    document.getElementById('create-modal').classList.add('show');
  }

  function hideCreateEvent() {
    document.getElementById('create-modal').classList.remove('show');
  }

  function loadVenues() {
    jsonpCall('getVenues', {}, function(data) {
      var select = document.getElementById('new-venue');
      select.innerHTML = '<option value="">Select venue...</option>';
      if (data.venues) {
        data.venues.forEach(function(venue) {
          var opt = document.createElement('option');
          opt.value = venue;
          opt.textContent = venue;
          select.appendChild(opt);
        });
      }
    });
  }

  function showCreateError(msg) {
    var el = document.getElementById('create-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function submitNewEvent() {
    var btn = document.getElementById('btn-create-event');
    try {
      var date = document.getElementById('new-date').value;
      var venue = document.getElementById('new-venue').value;
      var time = document.getElementById('new-time').value;
      var slots = document.getElementById('new-slots').value;
      var mailingList = document.getElementById('new-mailing-list').value;
      var notes = document.getElementById('new-notes').value;

      var missing = [];
      if (!date) missing.push('Date');
      if (!venue) missing.push('Venue');
      if (!time) missing.push('Starting Time');
      if (!slots) missing.push('Tee Times Reserved');
      if (missing.length) {
        showCreateError('Please fill in: ' + missing.join(', '));
        return;
      }

      document.getElementById('create-error').style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating...';

      var done = false;
      var script;
      function finish(ok, msg) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        try { if (script && script.parentNode) script.parentNode.removeChild(script); } catch (_) {}
        btn.disabled = false;
        btn.textContent = 'Create Event';
        if (ok) { hideCreateEvent(); showToast('Event created!'); loadEvents(); }
        else { showCreateError(msg); }
      }

      var fn = 'handle_create_' + Date.now();
      window[fn] = function(data) {
        if (data && data.success) finish(true);
        else finish(false, 'Server replied with an error: ' + ((data && data.error) || 'unknown'));
      };
      var timer = setTimeout(function() {
        finish(false, 'No response after 12s. The request may be blocked by Safari "Prevent Cross-Site Tracking" or a content blocker. Try toggling that off, or use the Mac.');
      }, 12000);

      var url = BACKEND_URL + '?action=createEvent&callback=' + fn
        + '&date=' + encodeURIComponent(date)
        + '&venue=' + encodeURIComponent(venue)
        + '&time=' + encodeURIComponent(time)
        + '&slots=' + encodeURIComponent(slots)
        + '&mailingList=' + encodeURIComponent(mailingList)
        + '&notes=' + encodeURIComponent(notes)
        + '&passcode=' + encodeURIComponent(PASSCODE);

      script = document.createElement('script');
      script.src = url;
      script.onerror = function() { finish(false, 'Could not load from the server (script blocked or network error).'); };
      document.body.appendChild(script);
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = 'Create Event'; }
      showCreateError('Script error: ' + e.message);
    }
  }


  ensureOrganizerAccess(loadEvents);
</script>
</body>
</html>
