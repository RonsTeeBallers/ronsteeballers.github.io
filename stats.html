<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Statistics — RonsTeeBallers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
      padding-bottom: 32px;
    }
    .header {
      background: #1a5276;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
      padding: 0 4px;
      line-height: 1;
    }
    .header-title { font-size: 18px; font-weight: 700; }

    .summary { display: flex; flex-wrap: wrap; gap: 10px; padding: 16px; }
    .summary-card {
      flex: 1;
      min-width: 70px;
      background: white;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .summary-num { font-size: 24px; font-weight: 800; color: #1a5276; }
    .summary-label { font-size: 11px; color: #5d6d7e; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #5d6d7e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 18px 16px 8px;
    }
    .card {
      background: white;
      margin: 0 16px 12px;
      border-radius: 12px;
      padding: 8px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f4f8;
      font-size: 15px;
    }
    .row:last-child { border-bottom: none; }
    .rank {
      font-size: 13px; font-weight: 700; color: #aab7c4;
      width: 26px; flex-shrink: 0;
    }
    .row-name { flex: 1; font-weight: 600; color: #1a2332; }
    .row-val {
      font-weight: 700; color: #1a5276;
      background: #eaf2ff; padding: 3px 10px; border-radius: 20px; font-size: 13px;
    }
    .wr-bits { font-size: 13px; color: #5d6d7e; display: flex; gap: 8px; }
    .wr-walk { color: #1a5276; font-weight: 700; }
    .wr-ride { color: #d68910; font-weight: 700; }
    .wr-either { color: #7f8c8d; font-weight: 700; }

    .partner-block { padding: 10px 16px; border-bottom: 1px solid #f0f4f8; }
    .partner-block:last-child { border-bottom: none; }
    .partner-name { font-weight: 700; color: #1a2332; margin-bottom: 4px; font-size: 15px; }
    .partner-list { font-size: 13px; color: #5d6d7e; line-height: 1.5; }
    .partner-list .cnt { color: #1a5276; font-weight: 700; }

    .search {
      width: calc(100% - 32px);
      margin: 0 16px 10px;
      padding: 12px 14px;
      border: 2px solid #d0d8e4;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
    }
    .search:focus { outline: none; border-color: #1a5276; }

    .nav { display: flex; gap: 8px; padding: 0 16px 4px; overflow-x: auto; }
    .nav a {
      flex-shrink: 0;
      font-size: 13px; font-weight: 700;
      color: #1a5276; background: #eaf2ff;
      padding: 7px 12px; border-radius: 20px; text-decoration: none;
    }

    .empty { padding: 16px; color: #5d6d7e; font-size: 14px; text-align: center; }
    .loading { text-align: center; padding: 50px 20px; color: #5d6d7e; font-size: 16px; }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #eaf2ff; border-top-color: #1a5276;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="header">
  <button class="header-back" onclick="window.location.href='organizer.html'">&#8249;</button>
  <div class="header-title">⛳ Statistics</div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Crunching the numbers...
</div>

<div id="app" style="display:none;">
  <div class="summary">
    <div class="summary-card"><div class="summary-num" id="s-outings">0</div><div class="summary-label">Outings</div></div>
    <div class="summary-card"><div class="summary-num" id="s-rounds">0</div><div class="summary-label">Rounds</div></div>
    <div class="summary-card"><div class="summary-num" id="s-active">0</div><div class="summary-label">Active</div></div>
    <div class="summary-card"><div class="summary-num" id="s-never">0</div><div class="summary-label">No-shows</div></div>
  </div>

  <div class="nav">
    <a href="#leaderboard">Leaderboard</a>
    <a href="#partners">Partners</a>
    <a href="#walkride">Walk/Ride</a>
    <a href="#never">Never Played</a>
    <a href="#courses">Courses</a>
  </div>

  <div class="section-label" id="leaderboard">Rounds Played</div>
  <div class="card" id="leaderboard-card"></div>

  <div class="section-label" id="partners">Top Partners</div>
  <input class="search" id="partner-search" placeholder="Search a player..." oninput="renderPartners()">
  <div class="card" id="partners-card"></div>

  <div class="section-label" id="walkride">Walk vs Ride</div>
  <div class="card" id="walkride-card"></div>

  <div class="section-label" id="never">Active Players — Never Played</div>
  <div class="card" id="never-card"></div>

  <div class="section-label" id="courses">Course Activity</div>
  <div class="card" id="courses-card"></div>
</div>

<script>
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxTDDH0nhMzS4YycZImyXV6w_cZr9j1jrF4A9VwljttPzNVH1oE5Xgx3c_8QXveneWA/exec';
  var STATS = null;

  function esc(s) {
    return (s || '').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function jsonp(action, cb) {
    var fn = 'cb_' + Date.now();
    window[fn] = cb;
    var s = document.createElement('script');
    s.src = BACKEND_URL + '?action=' + action + '&callback=' + fn;
    document.body.appendChild(s);
  }

  function renderLeaderboard() {
    var el = document.getElementById('leaderboard-card');
    if (!STATS.leaderboard || !STATS.leaderboard.length) { el.innerHTML = '<div class="empty">No rounds recorded yet.</div>'; return; }
    el.innerHTML = STATS.leaderboard.map(function(p, i) {
      return '<div class="row"><span class="rank">' + (i+1) + '</span>'
        + '<span class="row-name">' + esc(p.name) + '</span>'
        + '<span class="row-val">' + p.rounds + '</span></div>';
    }).join('');
  }

  function renderPartners() {
    var el = document.getElementById('partners-card');
    var q = (document.getElementById('partner-search').value || '').toLowerCase().trim();
    var list = STATS.topPartners || [];
    if (q) list = list.filter(function(p) { return p.name.toLowerCase().indexOf(q) !== -1; });
    if (!list.length) { el.innerHTML = '<div class="empty">No matches.</div>'; return; }
    el.innerHTML = list.map(function(p) {
      var partners = (p.partners && p.partners.length)
        ? p.partners.map(function(x) { return esc(x.name) + ' <span class="cnt">(' + x.count + ')</span>'; }).join(', ')
        : '<em>none yet</em>';
      return '<div class="partner-block"><div class="partner-name">' + esc(p.name) + '</div>'
        + '<div class="partner-list">' + partners + '</div></div>';
    }).join('');
  }

  function renderWalkRide() {
    var el = document.getElementById('walkride-card');
    if (!STATS.walkRide || !STATS.walkRide.length) { el.innerHTML = '<div class="empty">No RSVP history yet.</div>'; return; }
    el.innerHTML = STATS.walkRide.map(function(p) {
      return '<div class="row"><span class="row-name">' + esc(p.name) + '</span>'
        + '<span class="wr-bits"><span class="wr-walk">' + p.walk + ' walk</span>'
        + '<span class="wr-ride">' + p.ride + ' ride</span>'
        + '<span class="wr-either">' + p.either + ' either</span></span></div>';
    }).join('');
  }

  function renderNever() {
    var el = document.getElementById('never-card');
    if (!STATS.neverPlayed || !STATS.neverPlayed.length) { el.innerHTML = '<div class="empty">Everyone active has played. 🎉</div>'; return; }
    el.innerHTML = STATS.neverPlayed.map(function(name) {
      return '<div class="row"><span class="row-name">' + esc(name) + '</span></div>';
    }).join('');
  }

  function renderCourses() {
    var el = document.getElementById('courses-card');
    if (!STATS.courses || !STATS.courses.length) { el.innerHTML = '<div class="empty">No course data yet.</div>'; return; }
    el.innerHTML = STATS.courses.map(function(c) {
      return '<div class="row"><span class="row-name">' + esc(c.course) + '</span>'
        + '<span class="row-val">' + c.outings + ' outing' + (c.outings === 1 ? '' : 's') + '</span></div>';
    }).join('');
  }

  jsonp('getStats', function(data) {
    if (!data || data.error) {
      document.getElementById('loading').textContent = 'Could not load statistics' + (data && data.error ? ': ' + data.error : '.');
      return;
    }
    STATS = data;
    document.getElementById('s-outings').textContent = data.totalOutings || 0;
    document.getElementById('s-rounds').textContent = data.totalRounds || 0;
    document.getElementById('s-active').textContent = data.activePlayers || 0;
    document.getElementById('s-never').textContent = data.neverPlayedCount || 0;
    renderLeaderboard();
    renderPartners();
    renderWalkRide();
    renderNever();
    renderCourses();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  });
</script>
</body>
</html>
