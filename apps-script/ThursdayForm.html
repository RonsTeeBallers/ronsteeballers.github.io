<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f9f9f9;
    }
    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      background-color: #ccc;
      color: #333;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-send {
      background-color: #2e7d32;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-send:hover {
      background-color: #1b5e20;
    }
    .btn-cancel:hover {
      background-color: #bbb;
    }
  </style>
</head>
<body>
  <h2>⛳ Thursday Golf Outing</h2>

  <div class="form-group">
    <label for="date">Date</label>
    <input type="date" id="date" required>
  </div>

  <div class="form-group">
    <label for="course">Course</label>
    <select id="course" required>
      <option value="">-- Select a course --</option>
    </select>
  </div>

  <div class="form-group">
    <label for="teeTime">Starting Tee Time</label>
    <input type="time" id="teeTime" required>
  </div>

  <div class="form-group">
    <label for="teeTimesReserved">Tee Times Reserved</label>
    <input type="number" id="teeTimesReserved" min="1" max="20" required>
  </div>

  <div class="form-group">
    <label for="notes">Notes (optional)</label>
    <textarea id="notes" placeholder="Enter any special notes..."></textarea>
  </div>

  <div class="buttons">
    <button class="btn-cancel" onclick="google.script.host.close()">Cancel</button>
    <button class="btn-send" type="button" onclick="submitForm()">Send Invite</button>
  </div>

  <script>
    // Load courses from spreadsheet
    google.script.run
      .withSuccessHandler(function(courses) {
        var select = document.getElementById('course');
        courses.forEach(function(course) {
          var option = document.createElement('option');
          option.value = course;
          option.text = course;
          select.appendChild(option);
        });
      })
      .getCourseList();

    function submitForm() {
      var date = document.getElementById('date').value;
      var course = document.getElementById('course').value;
      var teeTime = document.getElementById('teeTime').value;
      var teeTimesReserved = document.getElementById('teeTimesReserved').value;
      var notes = document.getElementById('notes').value;

      // Validate
      if (!date || !course || !teeTime || !teeTimesReserved) {
        alert('Please fill in all required fields.');
        return;
      }

      // Format date as Monday, May 18, 2026
      var dateObj = new Date(date + 'T00:00:00');
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      var formattedDate = days[dateObj.getDay()] + ', ' + 
                          months[dateObj.getMonth()] + ' ' + 
                          dateObj.getDate() + ', ' + 
                          dateObj.getFullYear();

      // Format time as h:mm AM/PM
      var timeParts = teeTime.split(':');
      var hours = parseInt(timeParts[0]);
      var minutes = timeParts[1];
      var ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      var formattedTime = hours + ':' + minutes + ' ' + ampm;

      // Send to Apps Script
      document.getElementById('status').innerHTML = 'Creating draft...please wait.';
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert('Error: ' + error.message);
        })
        .processThursdayForm(formattedDate, course, formattedTime, teeTimesReserved, notes);
    }
  </script>
<div id="status" style="color:green; margin-top:10px; text-align:center;"></div>
</body>
</html>
