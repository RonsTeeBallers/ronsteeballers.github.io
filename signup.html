<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a5276">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>">
  <title>Who's Playing — RonsTeeBallers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
    }

    .header {
      background: #1a5276;
      color: white;
      padding: 20px 16px;
      text-align: center;
    }
    .header .logo { font-size: 28px; margin-bottom: 4px; }
    .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .header p { font-size: 14px; opacity: 0.85; }

    .card {
      background: white;
      margin: 16px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .slot-count { text-align: center; margin-bottom: 16px; }
    .slot-number { font-size: 36px; font-weight: 700; color: #1a5276; line-height: 1; }
    .slot-label { font-size: 14px; color: #5d6d7e; margin-top: 4px; }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #eaf2ff;
      border-radius: 6px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #1a5276;
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    .progress-fill.full { background: #1e8449; }
    .progress-fill.over { background: #922b21; }

    .oversubscribed {
      background: #fdf2f2;
      border: 1px solid #e74c3c;
      color: #922b21;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #5d6d7e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .player-list { list-style: none; }

    .player-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .player-item:last-child { border-bottom: none; }

    .player-number {
      width: 28px;
      height: 28px;
      background: #eaf2ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #1a5276;
      flex-shrink: 0;
      margin-right: 12px;
    }

    .player-info { flex: 1; }
    .player-name { font-size: 16px; font-weight: 600; color: #1a2332; margin-bottom: 3px; }
    .player-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .tag-walk { background: #eaf2ff; color: #1a5276; }
    .tag-ride { background: #fef9e7; color: #d68910; }
    .tag-nopref { background: #f2f3f4; color: #5d6d7e; }
    .tag-scramble { background: #eafaf1; color: #1e8449; }
    .tag-ownball { background: #eaf2ff; color: #1a5276; }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #5d6d7e;
      font-size: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eaf2ff;
      border-top-color: #1a5276;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 20px; color: #5d6d7e; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 16px; }

    .refresh-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 14px;
      background: white;
      border: 2px solid #1a5276;
      border-radius: 12px;
      color: #1a5276;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .refresh-btn:active { background: #eaf2ff; }

    .last-updated {
      text-align: center;
      font-size: 12px;
      color: #aab7c4;
      margin: 0 16px 20px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f4f8;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #5d6d7e; }
  </style>
</head>
<body>
  <div class="header">
  <div class="logo">⛳</div>
  <h1>RonsTeeBallers</h1>
  <p>Who's Playing</p>
</div>

<div id="loading" class="card loading" style="margin:16px;">
  <div class="spinner"></div>
  Loading signup list...
</div>

<div id="app" style="display:none;">

  <div class="card">
    <div class="slot-count">
      <div class="slot-number">
        <span id="confirmed-count">0</span> of <span id="slot-total">0</span>
      </div>
      <div class="slot-label">slots filled</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="oversubscribed-msg" class="oversubscribed" style="display:none;">
      Event is full — contact Ron if you would like to be added to the waitlist
    </div>
  </div>

  <div class="card">
    <div class="section-title">Confirmed Players</div>
    <ul class="player-list" id="player-list"></ul>
    <div id="empty-state" class="empty-state" style="display:none;">
      <div class="icon">🏌️</div>
      <p>No one has signed up yet.<br>Be the first!</p>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="tag tag-walk">Walk</span></div>
      <div class="legend-item"><span class="tag tag-ride">Ride</span></div>
      <div class="legend-item"><span class="tag tag-scramble">Scramble</span></div>
      <div class="legend-item"><span class="tag tag-ownball">Own Ball</span></div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadPlayers()">Refresh List</button>
  <div class="last-updated" id="last-updated"></div>

</div>
<script>
  var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxTDDH0nhMzS4YycZImyXV6w_cZr9j1jrF4A9VwljttPzNVH1oE5Xgx3c_8QXveneWA/exec';

  function getParams() {
    var params = new URLSearchParams(window.location.search);
    return { event: params.get('event') || '' };
  }

  // Escape user-originated text (guest names come from the public RSVP form).
  function esc(s) {
    return (s || '').toString()
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getWalkRideTag(walkRide) {
    if (!walkRide) return '';
    var val = walkRide.toLowerCase();
    if (val === 'walk') return '<span class="tag tag-walk">Walk</span>';
    if (val === 'ride') return '<span class="tag tag-ride">Ride</span>';
    return '<span class="tag tag-nopref">Either</span>';
  }

  function getScoringTag(scoring) {
    if (!scoring) return '';
    var val = scoring.toLowerCase();
    if (val === 'scramble') return '<span class="tag tag-scramble">Scramble</span>';
    if (val === 'own ball') return '<span class="tag tag-ownball">Own Ball</span>';
    return '';
  }

  var loadSeq = 0;   // guards against a stale timeout firing after a later load succeeded

  function loadPlayers() {
    var params = getParams();
    var event = params.event;
    var seq = ++loadSeq;

    var oldScript = document.getElementById('jsonp-script');
    if (oldScript) oldScript.remove();

    var script = document.createElement('script');
    script.id = 'jsonp-script';
    script.src = BACKEND_URL
      + '?action=getConfirmed'
      + '&eventId=' + encodeURIComponent(event)
      + '&callback=handlePlayersResponse';
    script.onerror = function() { handlePlayersResponse({ error: 'network' }); };
    document.body.appendChild(script);
    setTimeout(function() {
      if (seq === loadSeq) handlePlayersResponse({ error: 'timeout' });
    }, 15000);
  }

  function handlePlayersResponse(data) {
    if (loadSeq === 0) return;   // already handled for this load
    loadSeq = 0;
    if (data.error) {
      document.getElementById('last-updated').textContent =
        'Could not load the list — check your connection and tap Refresh.';
      showEmpty();
      return;
    }
    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
    renderPlayers(data);
  }

  function showEmpty() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('empty-state').style.display = 'block';
  }
  function renderPlayers(data) {
    var confirmed = data.confirmed || [];
    var count = data.count || 0;
    var slots = data.slots || 0;

    document.getElementById('confirmed-count').textContent = count;
    document.getElementById('slot-total').textContent = slots;

    var pct = slots > 0 ? Math.min((count / slots) * 100, 100) : 0;
    var fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';

    if (count > slots && slots > 0) {
      fill.className = 'progress-fill over';
      document.getElementById('oversubscribed-msg').style.display = 'block';
    } else if (count === slots && slots > 0) {
      fill.className = 'progress-fill full';
      document.getElementById('oversubscribed-msg').style.display = 'none';
    } else {
      fill.className = 'progress-fill';
      document.getElementById('oversubscribed-msg').style.display = 'none';
    }

    var list = document.getElementById('player-list');
    var empty = document.getElementById('empty-state');

    if (confirmed.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      var html = '';
      for (var i = 0; i < confirmed.length; i++) {
        var player = confirmed[i];
        html += '<li class="player-item">';
        html += '<div class="player-number">' + (i + 1) + '</div>';
        html += '<div class="player-info">';
        html += '<div class="player-name">' + esc(player.name)
          + (player.isGuest ? ' <span style="font-size:12px;color:#d68910;font-weight:600;">(guest of ' + esc(player.guestOf) + ')</span>' : '')
          + '</div>';
        html += '<div class="player-tags">';
        if (!player.isGuest) {
          html += getWalkRideTag(player.walkRide);
          html += getScoringTag(player.scoring);
        }
        html += '</div></div></li>';
      }
      list.innerHTML = html;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  loadPlayers();
  setInterval(loadPlayers, 60000);
</script>
</body>
</html>
